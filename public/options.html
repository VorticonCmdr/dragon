<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 0.875rem;
      color: #1e293b;
      background: #f8fafc;
      min-height: 100vh;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header img { width: 24px; height: 24px; }
    header h1 { font-size: 0.9375rem; font-weight: 600; color: #0f172a; }
    main { max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 0.5rem;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .card h2 { font-size: 0.875rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
    label { display: block; font-size: 0.8125rem; color: #475569; margin-bottom: 0.375rem; }
    select, textarea, input[type=text] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.8125rem;
      color: #1e293b;
      background: #fff;
      outline: none;
      transition: box-shadow 0.15s;
    }
    select:focus, textarea:focus, input:focus {
      box-shadow: 0 0 0 2px #3b82f6;
      border-color: #3b82f6;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
    }
    .current-ua {
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      color: #64748b;
      background: #f1f5f9;
      border-radius: 0.375rem;
      padding: 0.5rem 0.75rem;
      word-break: break-all;
    }
    .row { display: flex; align-items: center; gap: 0.75rem; }
    button {
      padding: 0.5rem 1.25rem;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      border-radius: 0.375rem;
      cursor: pointer;
      border: none;
      background: #3b82f6;
      color: #fff;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    #status { font-size: 0.8125rem; color: #16a34a; min-height: 1.25rem; }

    .card + .card { margin-top: 1.5rem; }

    .preset-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .preset-row {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.5rem 0.75rem;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 0.375rem;
    }
    .preset-name { font-weight: 500; color: #0f172a; white-space: nowrap; }
    .preset-regex {
      flex: 1;
      font-family: ui-monospace, monospace;
      font-size: 0.75rem;
      color: #475569;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .badge {
      padding: 0.125rem 0.5rem;
      border-radius: 9999px;
      font-size: 0.6875rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-include { background: #dcfce7; color: #16a34a; }
    .badge-exclude { background: #fee2e2; color: #dc2626; }
    .btn-delete {
      padding: 0.25rem 0.625rem;
      font-size: 0.75rem;
      background: transparent;
      color: #94a3b8;
      border: 1px solid #e2e8f0;
      border-radius: 0.25rem;
      cursor: pointer;
    }
    .btn-delete:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .add-form {
      display: grid;
      grid-template-columns: 1fr 2fr auto auto;
      gap: 0.5rem;
      align-items: end;
    }
    .add-form label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; }
    .add-form input, .add-form select { width: 100%; }
    .empty-hint { font-size: 0.8125rem; color: #94a3b8; }
    #regexStatus { font-size: 0.8125rem; color: #16a34a; min-height: 1.25rem; }

    /* Crawl Manager */
    .quota-wrap { display: flex; flex-direction: column; gap: 0.375rem; }
    .quota-bar-bg {
      width: 100%; height: 8px; background: #e2e8f0; border-radius: 9999px; overflow: hidden;
    }
    .quota-bar-fill { height: 100%; background: #3b82f6; border-radius: 9999px; transition: width 0.3s; }
    .quota-label { font-size: 0.75rem; color: #64748b; }

    .crawl-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .crawl-row {
      border: 1px solid #e2e8f0; border-radius: 0.375rem;
      padding: 0.625rem 0.75rem;
      display: flex; flex-direction: column; gap: 0.375rem;
    }
    .crawl-row.orphan { border-color: #fde68a; background: #fffbeb; }
    .crawl-row-top { display: flex; align-items: center; gap: 0.5rem; }
    .crawl-row-name {
      flex: 1; font-weight: 500; font-size: 0.8125rem; color: #0f172a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .crawl-row-name input {
      width: 100%; border: 1px solid #3b82f6; border-radius: 0.25rem;
      padding: 0.125rem 0.375rem; font-size: 0.8125rem; font-family: inherit;
    }
    .orphan-badge {
      font-size: 0.6875rem; background: #fef08a; color: #92400e;
      padding: 0.125rem 0.5rem; border-radius: 9999px; font-weight: 600; white-space: nowrap;
    }
    .crawl-row-meta { font-size: 0.75rem; color: #64748b; display: flex; gap: 1rem; flex-wrap: wrap; }
    .crawl-row-actions { display: flex; gap: 0.375rem; flex-wrap: wrap; }
    .btn-sm {
      padding: 0.25rem 0.625rem; font-size: 0.75rem; font-weight: 500;
      border-radius: 0.25rem; cursor: pointer; border: 1px solid #e2e8f0;
      background: #fff; color: #475569; font-family: inherit;
    }
    .btn-sm:hover { background: #f1f5f9; }
    .btn-sm.danger { color: #dc2626; }
    .btn-sm.danger:hover { background: #fee2e2; border-color: #fca5a5; }
    .btn-sm.primary { background: #3b82f6; color: #fff; border-color: #3b82f6; }
    .btn-sm.primary:hover { background: #2563eb; }
    .crawl-empty { font-size: 0.8125rem; color: #94a3b8; }
    #crawlManagerStatus { font-size: 0.8125rem; min-height: 1.25rem; }
  </style>
</head>
<body>
  <header>
    <img src="icons/dragon32.png" alt="blue dragon" />
    <h1>options</h1>
  </header>

  <main>
    <div class="card">
      <h2>User-Agent</h2>

      <div>
        <label for="preset">Select preset</label>
        <select id="preset"></select>
      </div>

      <div id="customWrap" style="display:none">
        <label for="customUA">Custom User-Agent</label>
        <textarea id="customUA" placeholder="Mozilla/5.0 …"></textarea>
      </div>

      <div>
        <label>Active User-Agent</label>
        <div class="current-ua" id="currentUA"></div>
      </div>

      <div class="row">
        <button id="saveBtn">Save</button>
        <span id="status"></span>
      </div>
    </div>

    <div class="card">
      <h2>URL-Filter Presets</h2>

      <div class="preset-list" id="presetList">
        <span class="empty-hint">No presets saved yet.</span>
      </div>

      <div class="add-form" id="addForm">
        <div>
          <label for="newName">Name</label>
          <input type="text" id="newName" placeholder="z.B. Nur Produkte" />
        </div>
        <div>
          <label for="newRegex">Regex-Pattern</label>
          <input type="text" id="newRegex" placeholder="z.B. /product/" />
        </div>
        <div>
          <label for="newType">Typ</label>
          <select id="newType">
            <option value="include">include</option>
            <option value="exclude">exclude</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="addPresetBtn">Add</button>
        </div>
      </div>

      <span id="regexStatus"></span>
    </div>

    <div class="card">
      <h2>Saved Crawls</h2>

      <div class="quota-wrap">
        <div class="quota-bar-bg"><div class="quota-bar-fill" id="quotaFill" style="width:0%"></div></div>
        <span class="quota-label" id="quotaLabel">Loading storage info…</span>
      </div>

      <div class="crawl-list" id="crawlList">
        <span class="crawl-empty">Lade…</span>
      </div>

      <span id="crawlManagerStatus"></span>
    </div>
  </main>

  <script src="db.js"></script>
  <script src="options.js"></script>
</body>
</html>
